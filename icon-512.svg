<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020509"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0080ff"/>
    </linearGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  
  <!-- Ambient glow -->
  <circle cx="256" cy="180" r="180" fill="url(#glow)" opacity="0.08"/>
  
  <!-- Main play icon -->
  <g filter="url(#shadow)">
    <!-- Outer ring -->
    <circle cx="256" cy="256" r="140" fill="none" stroke="url(#glow)" stroke-width="8" opacity="0.3"/>
    
    <!-- Inner ring -->
    <circle cx="256" cy="256" r="110" fill="none" stroke="url(#glow)" stroke-width="6" opacity="0.5"/>
    
    <!-- Play triangle -->
    <path d="M 220 200 L 220 312 L 320 256 Z" fill="url(#glow)" filter="url(#shadow)"/>
    
    <!-- Accent dots (streaming indicator) -->
    <circle cx="256" cy="140" r="6" fill="#00d4ff" opacity="0.8"/>
    <circle cx="300" cy="160" r="6" fill="#00d4ff" opacity="0.6"/>
    <circle cx="212" cy="160" r="6" fill="#00d4ff" opacity="0.6"/>
  </g>
  
  <!-- Text -->
  <text x="256" y="420" font-family="'Orbitron', monospace" font-size="36" font-weight="900" fill="url(#glow)" text-anchor="middle" letter-spacing="8">STREAM</text>
</svg>
