<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <!-- Gradients -->
    <linearGradient id="appleRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="50%" stop-color="#E74C3C"/>
      <stop offset="100%" stop-color="#C0392B"/>
    </linearGradient>
    
    <linearGradient id="potatoBrown" x1="20%" y1="20%" x2="80%" y2="80%">
      <stop offset="0%" stop-color="#E5C29F"/>
      <stop offset="40%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#B8905A"/>
    </linearGradient>
    
    <linearGradient id="leafGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#52C41A"/>
      <stop offset="100%" stop-color="#389E0D"/>
    </linearGradient>
    
    <radialGradient id="appleShine">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Filters -->
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="800" fill="#FAFAFA"/>
  
  <!-- Faint circuit board pattern in background -->
  <g opacity="0.04">
    <circle cx="150" cy="150" r="60" fill="none" stroke="#3498DB" stroke-width="2"/>
    <circle cx="650" cy="650" r="80" fill="none" stroke="#3498DB" stroke-width="2"/>
    <path d="M 150 150 L 300 300 L 500 300 L 650 650" stroke="#3498DB" stroke-width="1.5" fill="none"/>
    <circle cx="300" cy="300" r="4" fill="#3498DB"/>
    <circle cx="500" cy="300" r="4" fill="#3498DB"/>
  </g>
  
  <!-- Main character -->
  <g transform="translate(400, 400)">
    
    <!-- ============================================
         THE APPLE COSTUME SHELL
    ============================================ -->
    <g filter="url(#softShadow)">
      
      <!-- Apple body (with strategic gap showing it's a costume) -->
      <g>
        <!-- Main apple sphere -->
        <circle cx="0" cy="0" r="180" fill="url(#appleRed)"/>
        
        <!-- Highlight shine -->
        <ellipse cx="-50" cy="-60" rx="60" ry="90" fill="url(#appleShine)"/>
        
        <!-- Bottom shadow for depth -->
        <ellipse cx="0" cy="140" rx="150" ry="30" fill="#000000" opacity="0.1"/>
        
        <!-- SEAM LINE - showing the costume isn't perfect -->
        <path d="M -140 -40 Q -100 -35, -60 -40" 
              stroke="#C0392B" stroke-width="2.5" fill="none" opacity="0.3" stroke-dasharray="5,3"/>
        
        <!-- ZIPPER detail on the side -->
        <g transform="translate(-165, 0)" opacity="0.2">
          <rect x="-2" y="-80" width="4" height="160" fill="#8B4513" rx="2"/>
          <circle cx="0" cy="-80" r="6" fill="#A67C52"/>
          <!-- Zipper teeth -->
          <line x1="-6" y1="-70" x2="6" y2="-70" stroke="#8B4513" stroke-width="2"/>
          <line x1="-6" y1="-50" x2="6" y2="-50" stroke="#8B4513" stroke-width="2"/>
          <line x1="-6" y1="-30" x2="6" y2="-30" stroke="#8B4513" stroke-width="2"/>
          <line x1="-6" y1="-10" x2="6" y2="-10" stroke="#8B4513" stroke-width="2"/>
          <line x1="-6" y1="10" x2="6" y2="10" stroke="#8B4513" stroke-width="2"/>
          <line x1="-6" y1="30" x2="6" y2="30" stroke="#8B4513" stroke-width="2"/>
          <line x1="-6" y1="50" x2="6" y2="50" stroke="#8B4513" stroke-width="2"/>
          <line x1="-6" y1="70" x2="6" y2="70" stroke="#8B4513" stroke-width="2"/>
        </g>
        
        <!-- Leaf on top (part of costume) -->
        <g transform="translate(25, -175) rotate(-25)">
          <ellipse cx="0" cy="0" rx="30" ry="55" fill="url(#leafGreen)"/>
          <path d="M 0 -55 Q 5 -20, 0 0 Q -5 20, 0 55" 
                stroke="#2D7A0D" stroke-width="2.5" fill="none"/>
        </g>
      </g>
      
      <!-- ============================================
           THE BITE - REVEALING THE POTATO
      ============================================ -->
      <g transform="translate(125, -70)">
        
        <!-- Bite cutout circle (shows potato underneath) -->
        <circle cx="0" cy="0" r="55" fill="url(#potatoBrown)" stroke="#B8905A" stroke-width="3"/>
        
        <!-- Potato texture inside the bite -->
        <ellipse cx="-18" cy="-10" rx="10" ry="8" fill="#B8905A" opacity="0.5"/>
        <ellipse cx="15" cy="5" rx="12" ry="9" fill="#B8905A" opacity="0.4"/>
        <ellipse cx="-8" cy="20" rx="8" ry="6" fill="#B8905A" opacity="0.45"/>
        <ellipse cx="20" cy="-20" rx="7" ry="5" fill="#A67C52" opacity="0.6"/>
        
        <!-- Potato "eye" dimple in the bite -->
        <ellipse cx="-15" cy="0" rx="8" ry="6" fill="#A67C52" opacity="0.3"/>
        
        <!-- Circuit traces visible through the potato -->
        <g opacity="0.4">
          <path d="M -25 -5 L -10 -5 L -10 10" stroke="#3498DB" stroke-width="2.5" fill="none"/>
          <circle cx="-25" cy="-5" r="3" fill="#3498DB"/>
          <circle cx="-10" cy="10" r="3" fill="#3498DB"/>
          
          <path d="M 20 8 L 30 8" stroke="#3498DB" stroke-width="2.5" fill="none"/>
          <circle cx="20" cy="8" r="3" fill="#3498DB"/>
          <circle cx="30" cy="8" r="3" fill="#3498DB"/>
        </g>
        
        <!-- Bite mark teeth indentations on edge -->
        <g transform="rotate(-15)" opacity="0.4">
          <path d="M -40 -35 Q -38 -30, -35 -35 T -30 -35 T -25 -35" 
                stroke="#C0392B" stroke-width="2" fill="none"/>
        </g>
        
      </g>
      
      <!-- ============================================
           THE POTATO PEEKING THROUGH
      ============================================ -->
      
      <!-- Potato "eyes" showing through costume gaps -->
      <!-- Left eye -->
      <g transform="translate(-50, -10)">
        <!-- Eye socket dimple (potato characteristic) -->
        <ellipse cx="0" cy="0" rx="28" ry="22" fill="#C9965C" opacity="0.3"/>
        
        <!-- Microchip hiding in the potato eye -->
        <rect x="-12" y="-12" width="24" height="24" rx="3" fill="#2C3E50" opacity="0.8"/>
        <rect x="-8" y="-8" width="16" height="16" rx="2" fill="#34495E"/>
        <circle cx="0" cy="0" r="5" fill="#3498DB" filter="url(#innerGlow)"/>
        
        <!-- Chip contact pins barely visible -->
        <line x1="-12" y1="-6" x2="-15" y2="-6" stroke="#2C3E50" stroke-width="1.5" opacity="0.6"/>
        <line x1="-12" y1="0" x2="-15" y2="0" stroke="#2C3E50" stroke-width="1.5" opacity="0.6"/>
        <line x1="-12" y1="6" x2="-15" y2="6" stroke="#2C3E50" stroke-width="1.5" opacity="0.6"/>
      </g>
      
      <!-- Right eye -->
      <g transform="translate(50, -10)">
        <ellipse cx="0" cy="0" rx="28" ry="22" fill="#C9965C" opacity="0.3"/>
        <rect x="-12" y="-12" width="24" height="24" rx="3" fill="#2C3E50" opacity="0.8"/>
        <rect x="-8" y="-8" width="16" height="16" rx="2" fill="#34495E"/>
        <circle cx="0" cy="0" r="5" fill="#3498DB" filter="url(#innerGlow)"/>
        
        <line x1="12" y1="-6" x2="15" y2="-6" stroke="#2C3E50" stroke-width="1.5" opacity="0.6"/>
        <line x1="12" y1="0" x2="15" y2="0" stroke="#2C3E50" stroke-width="1.5" opacity="0.6"/>
        <line x1="12" y1="6" x2="15" y2="6" stroke="#2C3E50" stroke-width="1.5" opacity="0.6"/>
      </g>
      
      <!-- ============================================
           NERVOUS EXPRESSION
      ============================================ -->
      
      <!-- Awkward, nervous smile -->
      <path d="M -60 50 Q -30 68, 0 70 Q 30 68, 60 50" 
            stroke="#8B6F47" stroke-width="6" fill="none" 
            stroke-linecap="round" opacity="0.65"/>
      
      <!-- Small upward curve at ends (nervous/forced smile) -->
      <path d="M -60 50 Q -65 48, -70 50" 
            stroke="#8B6F47" stroke-width="5" fill="none" 
            stroke-linecap="round" opacity="0.5"/>
      <path d="M 60 50 Q 65 48, 70 50" 
            stroke="#8B6F47" stroke-width="5" fill="none" 
            stroke-linecap="round" opacity="0.5"/>
      
      <!-- Sweat drop (nervous about disguise) -->
      <g transform="translate(85, -5)">
        <ellipse cx="0" cy="0" rx="7" ry="11" fill="#5DADE2" opacity="0.5"/>
        <ellipse cx="-2" cy="-3" rx="3" ry="4" fill="#FFFFFF" opacity="0.7"/>
      </g>
      
      <!-- Additional small sweat drop -->
      <ellipse cx="95" cy="25" rx="5" ry="8" fill="#5DADE2" opacity="0.35"/>
      
      <!-- ============================================
           CIRCUITS GLITCHING THROUGH THE COSTUME
      ============================================ -->
      
      <g opacity="0.35">
        <!-- Left side circuit breaking through -->
        <path d="M -130 -50 L -90 -50 L -90 -20 L -70 -20" 
              stroke="#3498DB" stroke-width="4" fill="none" stroke-linecap="round"/>
        <circle cx="-130" cy="-50" r="5" fill="#3498DB"/>
        <circle cx="-90" cy="-50" r="5" fill="#3498DB"/>
        <circle cx="-90" cy="-20" r="5" fill="#3498DB"/>
        <circle cx="-70" cy="-20" r="5" fill="#3498DB"/>
        
        <!-- Right side circuit -->
        <path d="M 130 60 L 95 60 L 95 35" 
              stroke="#3498DB" stroke-width="4" fill="none" stroke-linecap="round"/>
        <circle cx="130" cy="60" r="5" fill="#3498DB"/>
        <circle cx="95" cy="60" r="5" fill="#3498DB"/>
        <circle cx="95" cy="35" r="5" fill="#3498DB"/>
        
        <!-- Bottom circuit peeking out -->
        <path d="M -40 140 L 0 140 L 0 160" 
              stroke="#3498DB" stroke-width="4" fill="none" stroke-linecap="round"/>
        <circle cx="-40" cy="140" r="5" fill="#3498DB"/>
        <circle cx="0" cy="140" r="5" fill="#3498DB"/>
      </g>
      
    </g>
    
  </g>
  
  <!-- Brand text -->
  <g>
    <text x="400" y="680" 
          font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" 
          font-size="68" 
          font-weight="900" 
          fill="#2C3E50" 
          text-anchor="middle" 
          letter-spacing="3">
      ApPotato
    </text>
    
    <!-- Tagline -->
    <text x="400" y="730" 
          font-family="'SF Mono', 'Fira Code', monospace" 
          font-size="20" 
          font-weight="500" 
          fill="#7F8C8D" 
          text-anchor="middle" 
          letter-spacing="6">
      NOT WHAT IT SEEMS
    </text>
  </g>
  
  <!-- Subtle footer accent dots -->
  <g transform="translate(400, 765)" opacity="0.4">
    <circle cx="-50" cy="0" r="4" fill="#3498DB"/>
    <circle cx="0" cy="0" r="4" fill="#E74C3C"/>
    <circle cx="50" cy="0" r="4" fill="#52C41A"/>
  </g>
  
</svg>
